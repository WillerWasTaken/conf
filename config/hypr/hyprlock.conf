# Hyprlock config
# Documentation: https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock

general {
    hide_cursor = true
}

background {
    monitor =
    path = ~/.lock.png
    color = rgb(000000)
    blur_passes = 0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(ffb52a)
    inner_color = rgb(222222)
    font_color = rgb(dfdfdf)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    position = 0, -20
    halign = center
    valign = center
}
