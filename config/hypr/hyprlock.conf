# Hyprlock config
# Documentation: https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock

general {
  hide_cursor = true
}

background {
  path = screenshot
  blur_passes = 2
}
image {
  path = ~/.lock.png
  size = 600
  border_size = 0
}

input-field {
  size = 250, 50
  outline_thickness = 2
  dots_size = 0.25
  dots_spacing = 0.15
  dots_center = true
  outer_color = rgb(ffb52a)
  inner_color = rgb(222222)
  font_color = rgb(dfdfdf)
  fade_on_empty = true
  placeholder_text = <i>Password...</i>
  position = 0, -20
  halign = center
  valign = center
  hide_input = true
}
