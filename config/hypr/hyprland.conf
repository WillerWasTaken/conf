# Hyprland config file
# Migrated from Sway/i3 config
# Documentation: https://wiki.hyprland.org

### Variables
$mod = SUPER
$term = kitty
$browser = firefox
$menu = rofi -show drun
$obsidian-cmd = kitty --title "Obsidian Nvim" --class "obsidian-nvim" -e nvim -c ":Obsidian workspace Second\ Brain" -c ":Obsidian quick_switch"

### Monitor configuration
# Auto-detect monitors; adjust as needed for external displays
# monitor = eDP-1, preferred, auto, 1
monitor = , preferred, auto, 1

# Fix flameshot https://ryanwise.me/blog/flameshot-on-hyprland/
# moves the window to x0, y0 on the screen
windowrulev2=move 0 0,class:(flameshot),title:(flameshot)
# shows the window on all workspaces
windowrulev2=pin,class:(flameshot),title:(flameshot)
# tell the application it's in fullscreen mode
windowrulev2=fullscreenstate,class:(flameshot),title:(flameshot)
# force the window to be floating ( not in a tiled pane )
windowrulev2=float,class:(flameshot),title:(flameshot)

### Input configuration
input {
  kb_layout = us
  kb_variant = altgr-intl

  touchpad {
    tap-to-click = true
    natural_scroll = true
    disable_while_typing = true
  }
}

### Appearance
general {
  gaps_in = 3
  gaps_out = 5
  border_size = 0
  layout = dwindle
}

decoration {
  rounding = 0
  blur {
    enabled = false
  }
  shadow {
    enabled = false
   }
}

animations {
  enabled = true
  bezier = ease, 0.25, 0.1, 0.25, 1.0
  animation = windows, 1, 3, ease
  animation = windowsOut, 1, 3, ease, popin 80%
  animation = fade, 1, 3, ease
  animation = workspaces, 1, 3, ease
}

dwindle {
  pseudotile = true
  preserve_split = true
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
}

### Key bindings

# Terminal
bind = $mod, Return, exec, $term

# Browser
bind = $mod, B, exec, $browser

# Kill focused window
bind = $mod SHIFT, Q, killactive

# App launcher
bind = $mod, D, exec, $menu

# App shortcuts
bind = $mod SHIFT, A, exec, rambox
bind = $mod SHIFT, S, exec, youtube-music
bind = $mod SHIFT, Z, exec, keepassxc
bind = $mod SHIFT, O, exec, $obsidian-cmd

# Lock
bind = $mod, slash, exec, hyprlock

# Notifications (mako)
bind = $mod, space, exec, makoctl dismiss
bind = $mod SHIFT, space, exec, makoctl mode -t do-not-disturb

# Volume
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 3 -u
bindel = , XF86AudioLowerVolume, exec, pamixer -d 3 -u
bindl = , XF86AudioMute, exec, pamixer -m

# Brightness
# bindel = , XF86MonoBrightnessUp, exec, brightnessctl set +5%
# bindel = , XF86MonoBrightnessDown, exec, brightnessctl set 5%-

# Screenshot
bind = , Print, exec, flameshot gui
bind = $mod, Print, exec, grim -g "$(slurp)" - | tesseract stdin stdout | tr -s '[:space:]\0' ' ' | sed 's/^ *//;s/ *$//' | wl-copy

### Navigation (vim-style)

# Change focus
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# Arrow keys
bind = $mod, Left, movefocus, l
bind = $mod, Down, movefocus, d
bind = $mod, Up, movefocus, u
bind = $mod, Right, movefocus, r

# Move focused window
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# Arrow keys
bind = $mod SHIFT, Left, movewindow, l
bind = $mod SHIFT, Down, movewindow, d
bind = $mod SHIFT, Up, movewindow, u
bind = $mod SHIFT, Right, movewindow, r

### Layout

# Toggle split direction (dwindle)
bind = $mod, V, togglesplit

# Fullscreen
bind = $mod, F, fullscreen, 0

# Pseudo (dwindle equivalent of tabbed/stacking)
bind = $mod, S, pseudo
bind = $mod, W, togglegroup
bind = $mod, E, togglesplit

# Floating
bind = $mod SHIFT, BackSpace, togglefloating
bind = $mod, BackSpace, cyclenext  # focus between floating/tiled

# Float + mouse drag/resize
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

### Workspaces

# Switch to workspace
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, grave, workspace, 9
bind = $mod, Tab, workspace, 10

# Move container to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, grave, movetoworkspace, 9
bind = $mod SHIFT, Tab, movetoworkspace, 10

# Move workspace to output
bind = $mod, Y, movecurrentworkspacetomonitor, l
bind = $mod, O, movecurrentworkspacetomonitor, r

### Hyprland management

# Reload config (Hyprland auto-reloads, but force reload available)
bind = $mod SHIFT, C, exec, hyprctl reload

# Exit Hyprland
bind = $mod SHIFT, E, exit

### Resize submap
bind = $mod, R, submap, resize

submap = resize
bind = , H, resizeactive, -10 0
bind = , J, resizeactive, 0 10
bind = , K, resizeactive, 0 -10
bind = , L, resizeactive, 10 0

bind = , Left, resizeactive, -10 0
bind = , Down, resizeactive, 0 10
bind = , Up, resizeactive, 0 -10
bind = , Right, resizeactive, 10 0

bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

### Window rules
windowrulev2 = workspace 1, class:^(kitty-startup)$
windowrulev2 = workspace 2, class:^(firefox-startup)$
windowrulev2 = workspace 4, class:^(rambox)$
windowrulev2 = workspace 4, class:^(signal)$
windowrulev2 = workspace 4, class:^(Signal)$
windowrulev2 = workspace 8, class:^(obsidian)$
windowrulev2 = workspace 9, class:^(obsidian-nvim)$
windowrulev2 = workspace 5, class:^(brave-browser)$
windowrulev2 = workspace 10, class:^(com.github.th_ch.youtube_music)$
windowrulev2 = workspace 10, class:^(YouTube Music)$

### Wallpaper
exec-once = hyprpaper

### Status bar
exec-once = waybar

### Autostart
exec-once = mako
exec-once = $term --class kitty-startup
exec-once = signal-desktop
exec-once = rambox
exec-once = obsidian
exec-once = $obsidian-cmd
exec-once = youtube-music
# Actually ends up on workspace 4 or 8
# exec-once = hyprctl dispatch workspace 2 && $browser --class firefox-startup
