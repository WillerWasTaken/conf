# Hyprland config file
# Migrated from Sway/i3 config
# Documentation: https://wiki.hyprland.org

# ### Plugins
# hy3: i3/sway-like manual tiling layout
# HY3_PLUGIN env var is set via uwsm env-hyprland (sourced before Hyprland starts)
# Use sh instead of `plugin = $HY3_PLUGIN` to avoid crash when the variable is not set
# Use sh -c to avoid Hyprland's own $VAR expansion (which would resolve to empty)
exec-once = sh -c '[ -n "$HY3_PLUGIN" ] && hyprctl plugin load "$HY3_PLUGIN"'

### Variables
$mod = SUPER
$term = kitty
$browser = firefox
$menu = rofi -show drun
$obsidian-cmd = kitty --title "Obsidian Nvim" --class "obsidian-nvim" -e nvim -c ":Obsidian workspace Second\ Brain"

### Monitor configuration
# Auto-detect monitors; adjust as needed for external displays
# monitor = eDP-1, preferred, auto, 1
monitor = , preferred, auto, 1

### Input configuration
input {
  kb_layout = us
  kb_variant = altgr-intl

  touchpad {
    tap-to-click = true
    natural_scroll = true
    disable_while_typing = true
  }
}

### Appearance
general {
  gaps_in = 3
  gaps_out = 5
  border_size = 0
  layout = hy3
}

decoration {
  rounding = 0
  blur {
    enabled = false
  }
  shadow {
    enabled = false
   }
}

animations {
  enabled = true
  bezier = ease, 0.25, 0.1, 0.25, 1.0
  animation = windows, 1, 3, ease
  animation = windowsOut, 1, 3, ease, popin 80%
  animation = fade, 1, 3, ease
  animation = workspaces, 1, 3, ease
}

dwindle {
  preserve_split = true
}

# hy3 plugin config (active when plugin is loaded)
plugin {
  hy3 {
    autotile {
      enable = true
    }
  }
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
}

### Key bindings

# Terminal
bind = $mod, Return, exec, $term

# Browser
bind = $mod, B, exec, $browser

# Kill focused window (hy3-aware)
bind = $mod SHIFT, Q, hy3:killactive

# App launcher
bind = $mod, D, exec, $menu

# App shortcuts
bind = $mod SHIFT, A, exec, rambox
bind = $mod SHIFT, S, exec, pear-desktop
bind = $mod SHIFT, Z, exec, keepassxc
bind = $mod SHIFT, O, exec, $obsidian-cmd

# Lock
bind = $mod, slash, exec, hyprlock

# Notifications (mako)
bind = $mod, space, exec, makoctl dismiss
bind = $mod SHIFT, space, exec, makoctl mode -t do-not-disturb

# Volume
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 3 -u
bindel = , XF86AudioLowerVolume, exec, pamixer -d 3 -u
bindl = , XF86AudioMute, exec, pamixer -m

# Media playback
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioStop, exec, playerctl stop

# Brightness
# bindel = , XF86MonoBrightnessUp, exec, brightnessctl set +5%
# bindel = , XF86MonoBrightnessDown, exec, brightnessctl set 5%-

# Screenshot
bind = , Print, exec, grimblast save area - | swappy -f -
bind = $mod, Print, exec, grimblast save area -| tesseract stdin stdout | tr -s '[:space:]\0' ' ' | sed 's/^ *//;s/ *$//' | wl-copy

### Navigation

# Change focus
bind = $mod, H, hy3:movefocus, l
bind = $mod, J, hy3:movefocus, d
bind = $mod, K, hy3:movefocus, u
bind = $mod, L, hy3:movefocus, r

# Arrow keys
bind = $mod, Left, hy3:movefocus, l
bind = $mod, Down, hy3:movefocus, d
bind = $mod, Up, hy3:movefocus, u
bind = $mod, Right, hy3:movefocus, r

# Move focused window
bind = $mod SHIFT, H, hy3:movewindow, l
bind = $mod SHIFT, J, hy3:movewindow, d
bind = $mod SHIFT, K, hy3:movewindow, u
bind = $mod SHIFT, L, hy3:movewindow, r

# Arrow keys
bind = $mod SHIFT, Left, hy3:movewindow, l
bind = $mod SHIFT, Down, hy3:movewindow, d
bind = $mod SHIFT, Up, hy3:movewindow, u
bind = $mod SHIFT, Right, hy3:movewindow, r

### Layout

# Split direction
bind = $mod, V, hy3:makegroup, v  # vertical split
bind = $mod, C, hy3:makegroup, h  # horizontal split

# Fullscreen
bind = $mod, F, fullscreen, 0

# Layout switching (i3-style)
bind = $mod, W, hy3:changegroup, toggletab  # tabbed toggle
bind = $mod, E, hy3:changegroup, opposite   # toggle split direction

# Floating
bind = $mod SHIFT, BackSpace, togglefloating
bind = $mod, BackSpace, cyclenext  # focus between floating/tiled

# Float + mouse drag/resize
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

### Workspaces

# Switch to workspace
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, grave, workspace, 9
bind = $mod, Tab, workspace, 10

# Move container to workspace
bind = $mod SHIFT, 1, hy3:movetoworkspace, 1
bind = $mod SHIFT, 2, hy3:movetoworkspace, 2
bind = $mod SHIFT, 3, hy3:movetoworkspace, 3
bind = $mod SHIFT, 4, hy3:movetoworkspace, 4
bind = $mod SHIFT, 5, hy3:movetoworkspace, 5
bind = $mod SHIFT, 6, hy3:movetoworkspace, 6
bind = $mod SHIFT, 7, hy3:movetoworkspace, 7
bind = $mod SHIFT, 8, hy3:movetoworkspace, 8
bind = $mod SHIFT, grave, hy3:movetoworkspace, 9
bind = $mod SHIFT, Tab, hy3:movetoworkspace, 10

# Move workspace to output
bind = $mod, Y, movecurrentworkspacetomonitor, l
bind = $mod, O, movecurrentworkspacetomonitor, r

### Hyprland management

# Reload config (Hyprland auto-reloads, but force reload available)
bind = $mod SHIFT, C, exec, hyprctl reload

### Resize submap
bind = $mod, R, submap, resize

submap = resize
bind = , H, resizeactive, -10 0
bind = , J, resizeactive, 0 10
bind = , K, resizeactive, 0 -10
bind = , L, resizeactive, 10 0

bind = , Left, resizeactive, -10 0
bind = , Down, resizeactive, 0 10
bind = , Up, resizeactive, 0 -10
bind = , Right, resizeactive, 10 0

bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

### Window rules
windowrule = workspace 1, match:class ^(kitty-startup)$
# windowrule = workspace 2, class:^(firefox-startup)$
# Auto group on startup when available
# https://github.com/outfoxxed/hy3/issues/148
windowrule = workspace 4, match:class ^(rambox)$
windowrule = workspace 4, match:class ^(signal)$
windowrule = workspace 8, match:class ^(obsidian)$
windowrule = workspace 9, match:class ^(obsidian-nvim)$
windowrule = workspace 5, match:class ^(brave-browser)$
windowrule = workspace 10, match:class ^(com.github.th_ch.youtube_music)$

### Wallpaper
exec-once = hyprpaper

### Status bar
exec-once = waybar

### Autostart
exec-once = mako
exec-once = $term --class kitty-startup
exec-once = signal-desktop
exec-once = rambox
exec-once = obsidian
exec-once = $obsidian-cmd
exec-once = pear-desktop
# Forcing firefox' class makes all subsequent firefox processes keeping that class, just solve it with sleep instead
exec-once = sleep 10 && hyprctl dispatch workspace 2 && $browser
